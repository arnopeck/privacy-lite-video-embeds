name: Temporary prefixed class fix

on:
  push:
    paths:
      - '.github/workflows/fix-prefixed-class.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prefix plugin class
        shell: bash
        run: |
          set -euo pipefail
          perl -0pi -e 's/\bPrivacy_Lite_Video_Embeds\b/PLYE_Privacy_Lite_Video_Embeds/g' privacy-lite-video-embeds.php
          git status --short

      - name: Commit fix
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add privacy-lite-video-embeds.php
          git commit -m "Prefix main plugin class"
          git push
