name: Temporary rebrand to Privacy Lite Video Embeds

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebrand:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebrand plugin files
        shell: bash
        run: |
          set -euo pipefail

          OLD_SLUG="privacy-lite-youtube-embeds"
          NEW_SLUG="privacy-lite-video-embeds"
          OLD_NAME="Privacy Lite YouTube Embeds"
          NEW_NAME="Privacy Lite Video Embeds for YouTube"

          replace_text() {
            local search="$1"
            local replace="$2"
            grep -rl --exclude-dir=.git --exclude-dir=.github --exclude='*.mo' --exclude='*.png' --exclude='*.jpg' --exclude='*.jpeg' --exclude='*.gif' --exclude='*.webp' --exclude='*.svg' "$search" . \
              | xargs -r sed -i "s/${search}/${replace}/g" || true
          }

          if [ -f "${OLD_SLUG}.php" ]; then
            git mv "${OLD_SLUG}.php" "${NEW_SLUG}.php"
          fi

          if [ -f "assets/${OLD_SLUG}.css" ]; then
            git mv "assets/${OLD_SLUG}.css" "assets/${NEW_SLUG}.css"
          fi

          if [ -f "assets/${OLD_SLUG}.js" ]; then
            git mv "assets/${OLD_SLUG}.js" "assets/${NEW_SLUG}.js"
          fi

          if compgen -G "languages/${OLD_SLUG}*" > /dev/null; then
            for file in languages/${OLD_SLUG}*; do
              git mv "$file" "${file/${OLD_SLUG}/${NEW_SLUG}}"
            done
          fi

          replace_text "$OLD_SLUG" "$NEW_SLUG"
          replace_text "$OLD_NAME" "$NEW_NAME"
          replace_text "Privacy Lite YouTube" "Privacy Lite Video"
          replace_text "Privacy_Lite_YouTube_Embeds" "Privacy_Lite_Video_Embeds"

          sed -i "s/Fast YouTube embeds\. Nothing loads until click\./Fast video embeds for YouTube. Nothing loads until click./g" "${NEW_SLUG}.php" README.md readme.txt || true
          sed -i "s/Replaces YouTube embeds with local thumbnails/Replaces video embeds from YouTube with local thumbnails/g" "${NEW_SLUG}.php" README.md readme.txt || true
          sed -i "s/YouTube privacy replacement/Video privacy replacement/g" "${NEW_SLUG}.php" || true
          sed -i "s/Replace YouTube embeds with local thumbnails/Replace video embeds from YouTube with local thumbnails/g" "${NEW_SLUG}.php" || true
          sed -i "s#Plugin URI: https://github.com/arnopeck/${OLD_SLUG}#Plugin URI: https://github.com/arnopeck/${NEW_SLUG}#g" "${NEW_SLUG}.php" || true

          git status --short

      - name: Commit rebrand
        shell: bash
        run: |
          set -euo pipefail
          if git diff --cached --quiet && git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Rebrand plugin for WordPress.org trademark review"
          git push
