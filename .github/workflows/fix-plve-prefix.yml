name: Temporary PLVE prefix cleanup

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/fix-plve-prefix.yml'

permissions:
  contents: write

jobs:
  fix-prefix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Replace internal prefix
        shell: bash
        run: |
          set -euo pipefail

          replace_text() {
            local search="$1"
            local replace="$2"
            grep -rl --exclude-dir=.git --exclude-dir=.github --exclude='*.mo' --exclude='*.png' --exclude='*.jpg' --exclude='*.jpeg' --exclude='*.gif' --exclude='*.webp' --exclude='*.svg' "$search" . \
              | xargs -r sed -i "s/${search}/${replace}/g" || true
          }

          replace_text "PLYE_" "PLVE_"
          replace_text "plye_" "plve_"
          replace_text "--plye-" "--plve-"
          replace_text "data-plye-" "data-plve-"
          replace_text "plye-" "plve-"
          replace_text "\.plye-" "\.plve-"

          git status --short

      - name: Commit prefix cleanup
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Use PLVE prefix consistently"
          git push
